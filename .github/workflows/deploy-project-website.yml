name: Deploy Project Website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "Project/Website/**"
      - ".github/workflows/deploy-project-website.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Arabic demo artifact
        run: |
          mkdir -p Project/Website/dist
          demo_source="Project/Website/public/arabic-embeddings-demo.html"
          cp "$demo_source" Project/Website/dist/index.html
          cp "$demo_source" Project/Website/dist/arabic-embeddings-demo.html

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Project/Website/dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
